<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>QR 스캔</title>
<style>
  body{margin:0;background:#0a0a0f;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Malgun Gothic',sans-serif}
  .box{text-align:center;padding:40px}
  h2{color:#e2e8f0;font-size:18px;margin-bottom:6px}
  p{color:#64748b;font-size:13px;margin-bottom:28px}
  .qr-wrap{background:#fff;padding:16px;border-radius:16px;display:inline-block;box-shadow:0 0 40px rgba(192,132,252,.3)}
  .qr-wrap img{display:block;width:260px;height:260px}
  .label{margin-top:20px;font-size:12px;color:#4a5568}
</style>
</head>
<body>
<div class="box">
  <h2>📱 신당 키우기 분석 보고서</h2>
  <p>폰 카메라로 QR 스캔 → 모바일에서 바로 열림</p>
  <div class="qr-wrap">
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=260x260&data=https%3A%2F%2Fhtmlpreview.github.io%2F%3Fhttps%3A%2F%2Fraw.githubusercontent.com%2Ffantastrickga4-cmyk%2Fattendance-web%2Fmain%2Fmudang-analysis-report.html" alt="QR코드">
  </div>
  <div class="label">📌 인터넷 연결 상태에서 스캔하세요</div>
</div>
</body>
</html>
